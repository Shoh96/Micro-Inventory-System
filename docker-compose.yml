# =====================================================
# Community Micro-Inventory System V2 — docker-compose
# =====================================================

services:
  app:
    build: .
    container_name: micro-inventory
    ports:
      - "3000:3000"
    volumes:
      # Persist SQLite database across container restarts.
      - ./data:/app/data
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change_this_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      DB_PATH: /app/data/inventory.db
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-*}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))" ]
      interval: 30s
      timeout: 5s
      retries: 3
