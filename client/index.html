<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Community Micro-Inventory System – Digital inventory management for small shop owners." />
  <title>Micro-Inventory | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">

    <!-- Branding -->
    <div class="auth-brand">
      <div class="brand-icon">📦</div>
      <h1 class="brand-name">MicroStock</h1>
      <p class="brand-tagline">Smart inventory for your shop</p>
    </div>

    <!-- Tab switcher -->
    <div class="auth-tabs" role="tablist">
      <button class="tab-btn active" id="tab-login" role="tab" aria-selected="true" aria-controls="panel-login">
        Login
      </button>
      <button class="tab-btn" id="tab-register" role="tab" aria-selected="false" aria-controls="panel-register">
        Register
      </button>
    </div>

    <!-- Login form -->
    <div class="auth-panel active" id="panel-login" role="tabpanel" aria-labelledby="tab-login">
      <form id="login-form" novalidate>
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          <span class="btn-text">Log In</span>
          <span class="btn-spinner hidden" aria-hidden="true"></span>
        </button>
        <p class="auth-msg" id="login-msg" role="alert"></p>
      </form>
    </div>

    <!-- Register form -->
    <div class="auth-panel" id="panel-register" role="tabpanel" aria-labelledby="tab-register">
      <form id="register-form" novalidate>
        <div class="field">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" placeholder="Amara Nwosu" autocomplete="name" required />
        </div>
        <div class="field">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="reg-password">Password <small>(min. 8 characters)</small></label>
          <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="register-btn">
          <span class="btn-text">Create Account</span>
          <span class="btn-spinner hidden" aria-hidden="true"></span>
        </button>
        <p class="auth-msg" id="register-msg" role="alert"></p>
      </form>
    </div>

  </div><!-- /.auth-container -->

  <script src="js/app.js"></script>
</body>
</html>
